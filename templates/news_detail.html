{% extends "base.html" %}
{% block content %}
<div style="max-width:900px;margin:auto;padding:20px;">

  <h1 style="font-size:32px;font-weight:700;margin-bottom:10px;">
    {{ item.title }}
  </h1>

  <p style="color:#666;font-size:14px;margin-bottom:20px;">
    <strong>Category:</strong> {{ item.category }}
    &nbsp;•&nbsp;
    <strong>Published:</strong> {{ item.created_at.strftime('%B %d, %Y') }}
  </p>

{% if item.image_url %}
    <img src="{{ item.image_url }}"
         alt="{{ item.title }}"
         style="width:100%;max-height:450px;object-fit:cover;border:3px solid red;border-radius:8px;margin-bottom:25px;">
{% endif %}


  <!-- Use summary instead of content -->
<div style="font-size:18px;line-height:1.7;color:#f5f5f5;">
  {{ item.summary | safe }}
</div>


</div>
{% endblock %}
