<!DOCTYPE html>
<html>
<head>
    <title>TrekChat SOS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            padding: 20px;
        }
        h1 {
            color: #d32f2f;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .sos-btn {
            background: #ef4444;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            margin-top: 15px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .sos-btn:hover {
            background: #b91c1c;
        }
        .voice-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #voice-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 20px;
        }
        #voice-btn:hover {
            background: #d60000;
        }
    </style>
</head>
<body>

<h1>🚨 TrekChat SOS System</h1>
<p>If you are in danger, fill this form and your emergency contact will be notified immediately.</p>

<form method="POST">
    <label>Your Name</label>
    <input type="text" name="user_name" required>

    <label>Emergency Contact Email</label>
    <input type="email" name="emergency_email" required>

    <label>Emergency Contact Phone</label>
    <input type="text" name="emergency_phone" required>

    <label>Your Location</label>
    <input type="text" name="location" id="location-field" placeholder="Fetching location...">

    <!-- NEW: Language Selector -->
    <label>Choose Language for Voice Input</label>
    <select id="lang-select"></select>

    <!-- NEW: Voice + Text Message -->
    <label>Optional Message (Speak or Type)</label>
    <div class="voice-row">
        <textarea id="message" name="message" placeholder="Describe your situation"></textarea>
        <button type="button" id="voice-btn">🎤</button>
    </div>

    <button class="sos-btn">SEND SOS</button>
</form>

<script>
navigator.geolocation.getCurrentPosition(function(pos) {
    document.getElementById("location-field").value =
        pos.coords.latitude + ", " + pos.coords.longitude;
});

// ---------------------------
// MULTI-LANGUAGE VOICE INPUT
// ---------------------------

const langSelect = document.getElementById("lang-select");

// List of all languages supported by Chrome Speech Recognition
const languages = [
    ["Afrikaans", "af-ZA"], ["Arabic (Egypt)", "ar-EG"], ["Arabic (Saudi Arabia)", "ar-SA"],
    ["Bengali (India)", "bn-IN"], ["Bengali (Bangladesh)", "bn-BD"], ["Bulgarian", "bg-BG"],
    ["Catalan", "ca-ES"], ["Chinese (Mandarin)", "zh-CN"], ["Chinese (Taiwan)", "zh-TW"],
    ["Croatian", "hr-HR"], ["Czech", "cs-CZ"], ["Danish", "da-DK"], ["Dutch", "nl-NL"],
    ["English (US)", "en-US"], ["English (UK)", "en-GB"], ["English (India)", "en-IN"],
    ["Filipino", "fil-PH"], ["Finnish", "fi-FI"], ["French", "fr-FR"], ["German", "de-DE"],
    ["Greek", "el-GR"], ["Gujarati", "gu-IN"], ["Hebrew", "he-IL"], ["Hindi", "hi-IN"],
    ["Hungarian", "hu-HU"], ["Indonesian", "id-ID"], ["Italian", "it-IT"], ["Japanese", "ja-JP"],
    ["Kannada", "kn-IN"], ["Korean", "ko-KR"], ["Malayalam", "ml-IN"], ["Marathi", "mr-IN"],
    ["Nepali", "ne-NP"], ["Norwegian", "no-NO"], ["Polish", "pl-PL"], ["Portuguese (Brazil)", "pt-BR"],
    ["Portuguese (Portugal)", "pt-PT"], ["Punjabi", "pa-IN"], ["Romanian", "ro-RO"], ["Russian", "ru-RU"],
    ["Serbian", "sr-RS"], ["Sinhala", "si-LK"], ["Slovak", "sk-SK"], ["Slovenian", "sl-SI"],
    ["Spanish (Spain)", "es-ES"], ["Spanish (Mexico)", "es-MX"], ["Swedish", "sv-SE"],
    ["Tamil", "ta-IN"], ["Telugu", "te-IN"], ["Thai", "th-TH"], ["Turkish", "tr-TR"],
    ["Ukrainian", "uk-UA"], ["Urdu (Pakistan)", "ur-PK"], ["Vietnamese", "vi-VN"]
];

// Populate dropdown
languages.forEach(lang => {
    const option = document.createElement("option");
    option.value = lang[1];
    option.textContent = lang[0];
    langSelect.appendChild(option);
});

// Voice Recognition
const voiceBtn = document.getElementById("voice-btn");
const messageBox = document.getElementById("message");

let recognition;

if ("webkitSpeechRecognition" in window) {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        messageBox.value += transcript;
    };

    recognition.onerror = function(event) {
        alert("Voice recognition error: " + event.error);
    };
} else {
    alert("Voice recognition not supported on this browser.");
}

voiceBtn.addEventListener("click", function() {
    if (recognition) {
        recognition.lang = langSelect.value; // Set selected language
        recognition.start();
    }
});
</script>

</body>
</html>
