{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <h2>Admin Login</h2>

    <form method="POST" class="login-form">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

<style>
.login-container {
    width: 350px;
    margin: 80px auto;
    padding: 25px;
    background: #1e1e1e;
    border-radius: 10px;
    color: white;
    text-align: center;
}

.login-form input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

.login-form button {
    width: 95%;
    padding: 10px;
    background: #4CAF50;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.login-form button:hover {
    background: #45a049;
}
</style>
{% endblock %}
