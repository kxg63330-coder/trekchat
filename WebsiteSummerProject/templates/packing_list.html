{% extends "base.html" %}
{% block content %}

<section class="trek-cost-page reveal">
    <h1>Packing List Generator</h1>
    <p>Get a customized packing list based on region, season, and difficulty.</p>

    <div class="calculator-box">

        <label>Select Trek Region:</label>
<select id="region">
    <option value="nepal">Nepal (Himalayas)</option>
    <option value="india">India (Himalayas)</option>
    <option value="europe">Europe (Alps)</option>
    <option value="japan">Japan (Fuji, Alps)</option>
    <option value="new_zealand">New Zealand (Southern Alps)</option>
    <option value="usa">USA (Rockies, Sierra Nevada)</option>
    <option value="south_america">South America (Andes)</option>
    <option value="africa">Africa (Kilimanjaro, Atlas)</option>
    <option value="australia">Australia (Tasmania Trails)</option>
    <option value="canada">Canada (Rocky Mountains)</option>
</select>


        <label>Select Season:</label>
        <select id="season">
            <option value="summer">Summer</option>
            <option value="winter">Winter</option>
            <option value="monsoon">Monsoon</option>
            <option value="autumn">Autumn</option>
        </select>

        <label>Difficulty Level:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="moderate">Moderate</option>
            <option value="hard">Hard</option>
        </select>

        <button onclick="generateList()" class="btn-small">Generate Packing List</button>

        <div id="result" class="result-box"></div>
    </div>
</section>

<script>
function generateList() {
    const region = document.getElementById("region").value;
    const season = document.getElementById("season").value;
    const difficulty = document.getElementById("difficulty").value;

    let items = [
        "Backpack (40–60L)",
        "Water bottle / Hydration pack",
        "Snacks & energy bars",
        "Sunglasses",
        "Sunscreen",
        "Basic first aid kit"
    ];

 // Region-specific items
if (region === "nepal" || region === "india") {
    items.push("Thermal base layers", "Down jacket", "Trekking poles");
}

if (region === "europe") {
    items.push("Waterproof jacket", "Microspikes (for snow)", "Insulated gloves");
}

if (region === "japan") {
    items.push("Rain cover", "Lightweight fleece", "Compact umbrella");
}

if (region === "new_zealand") {
    items.push("Windproof jacket", "Quick-dry clothing", "Bug repellent");
}

if (region === "usa") {
    items.push("Bear spray (Rockies)", "Layered clothing", "Trail map");
}

if (region === "south_america") {
    items.push("Altitude sickness tablets", "Warm layers", "Sun hat");
}

if (region === "africa") {
    items.push("Sun protection", "Hydration salts", "Wide‑brim hat");
}

if (region === "australia") {
    items.push("Sunblock", "Lightweight clothing", "Insect repellent");
}

if (region === "canada") {
    items.push("Thermal gloves", "Snow gaiters", "Insulated jacket");
}


    // Season-specific items
    if (season === "winter") {
        items.push("Gloves", "Wool socks", "Balaclava", "Heavy jacket");
    }
    if (season === "summer") {
        items.push("Cap / Hat", "Light clothing");
    }
    if (season === "monsoon") {
        items.push("Raincoat", "Waterproof shoes", "Dry bags");
    }

    // Difficulty-specific items
    if (difficulty === "moderate") {
        items.push("Extra socks", "Electrolyte tablets");
    }
    if (difficulty === "hard") {
        items.push("High-ankle boots", "Headlamp", "Emergency blanket");
    }

    let html = "<h3>Your Packing List</h3><ul>";
    items.forEach(i => html += `<li>${i}</li>`);
    html += "</ul>";

    document.getElementById("result").innerHTML = `
    ${html}
    <button class="btn-small" onclick="shareList()" style="margin-top:15px;">Share Packing List</button>
`;

}

    function shareList() {
    const text = document.getElementById("result").innerText;

    if (navigator.share) {
        navigator.share({
            title: "My Trek Packing List",
            text: text
        });
    } else {
        navigator.clipboard.writeText(text);
        alert("Packing list copied to clipboard!");
    }
}

</script>

{% endblock %}
