{% extends "base.html" %}
{% set admin_page = True %}

{% block content %}
<div class="dashboard">
    <h1>Add News</h1>

    <form method="POST" enctype="multipart/form-data"
      style="background:white; padding:20px; border-radius:10px; color:black;">


        <label>Title</label>
        <input type="text" name="title" required>

        <label>Summary</label>
        <textarea name="summary" rows="5" required></textarea>

        <label>Category</label>
        <select name="category">
            {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
        </select>

        <label>Meta Title</label>
        <input type="text" name="meta_title">

        <label>Meta Description</label>
        <textarea name="meta_description" rows="3"></textarea>

        <!-- ⭐ DO NOT ADD content or image_url fields here -->
        <!-- They overwrite your auto-generated values -->

        <label>Upload Image</label>
<input type="file" name="image" accept="image/*">


        <button type="submit" class="btn">Add News</button>
    </form>
</div>
{% endblock %}
