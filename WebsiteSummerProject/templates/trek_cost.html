{% extends "base.html" %}
{% block content %}

<section class="trek-cost-page reveal">
    <h1>Trek Cost Calculator</h1>
    <p>Estimate the total cost of your trekking adventure based on duration, region, difficulty, and group size.</p>

    <div class="calculator-box">

        <label>Choose Trek Region:</label>
        <select id="region">
            <option value="nepal">Nepal (Everest, Annapurna)</option>
            <option value="india">India (Himalayas)</option>
            <option value="europe">Europe (Alps)</option>
            <option value="south_america">South America (Andes)</option>
            <option value="usa">USA (Rocky Mountains)</option>
            <option value="africa">Africa (Kilimanjaro, Atlas)</option>
            <option value="japan">Japan (Fuji, Japanese Alps)</option>
            <option value="australia">Australia (Tasmania Trails)</option>
            <option value="new_zealand">New Zealand (Southern Alps)</option>
        </select>

        <label>Difficulty Level:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="moderate">Moderate</option>
            <option value="hard">Hard</option>
        </select>

        <label>Number of Trekking Days:</label>
        <input type="number" id="days" min="1" placeholder="e.g., 10">

        <label>Group Size:</label>
        <input type="number" id="group" min="1" placeholder="e.g., 2">

        <button onclick="calculateCost()" class="btn-small">Calculate</button>

        <div id="result" class="result-box"></div>
    </div>
</section>

<script>
function calculateCost() {
    const region = document.getElementById("region").value;
    const difficulty = document.getElementById("difficulty").value;
    const days = parseInt(document.getElementById("days").value);
    const group = parseInt(document.getElementById("group").value);

    if (!days || !group) {
        document.getElementById("result").innerHTML = "<p>Please enter valid values.</p>";
        return;
    }

    // Base cost per day per person
    let baseCost = {
        nepal: 45,
        india: 35,
        europe: 90,
        south_america: 55,
        usa: 70,
        africa: 65,
        japan: 80,
        australia: 50,
        new_zealand: 85
    }[region];

    // Difficulty multiplier
    let difficultyMultiplier = {
        easy: 1.0,
        moderate: 1.2,
        hard: 1.5
    }[difficulty];

    // Additional costs
    const guideCost = 25 * days;          // per group
    const permitCost = region === "nepal" ? 50 : 30;
    const foodCost = 15 * days * group;
    const stayCost = 20 * days * group;

    // Final calculation
    const trekkingCost = baseCost * days * group * difficultyMultiplier;
    const total = trekkingCost + guideCost + permitCost + foodCost + stayCost;

    document.getElementById("result").innerHTML = `
        <h3>Estimated Trek Cost</h3>
        <p><strong>Region:</strong> ${region.replace("_", " ").toUpperCase()}</p>
        <p><strong>Difficulty:</strong> ${difficulty.toUpperCase()}</p>
        <p><strong>Days:</strong> ${days}</p>
        <p><strong>Group Size:</strong> ${group}</p>

        <div class="breakdown">
            <p>Trekking Cost: $${trekkingCost.toLocaleString()}</p>
            <p>Guide Cost: $${guideCost.toLocaleString()}</p>
            <p>Permit Cost: $${permitCost.toLocaleString()}</p>
            <p>Food Cost: $${foodCost.toLocaleString()}</p>
            <p>Accommodation: $${stayCost.toLocaleString()}</p>
        </div>

        <p class="total-cost">Total Estimated Cost: $${total.toLocaleString()}</p>
    `;
}
</script>

{% endblock %}
